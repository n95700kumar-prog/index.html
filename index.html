<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam AI - Realistic</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .input-container { display: flex; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(10px); border: 1.5px solid #ff4757; border-radius: 50px; width: 85%; max-width: 400px; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { flex: 1; background: none; border: none; color: white; padding: 12px 20px; outline: none; font-size: 16px; }
        button { background: #ff4757; border: none; color: white; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: 0.3s; font-size: 20px; }
        button:active { transform: scale(0.9); }
        #loader { position: fixed; top: 50%; width: 100%; text-align: center; color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Rupam taiyaar ho rahi hai...</div>

<div id="ui-layer">
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Rupam se baat karein...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lighting: Realistic Soft Light
scene.add(new THREE.AmbientLight(0xffffff, 3.5));
const spotLight = new THREE.SpotLight(0xffffff, 2);
spotLight.position.set(5, 5, 5);
scene.add(spotLight);

let model, head, mouse = { x: 0, y: 0 };
let clock = new THREE.Clock();

new GLTFLoader().load('https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(5).glb', (gltf) => {
    model = gltf.scene;

    // --- AUTOMATIC FIT SKILL ---
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.2 / size.y; // Har model ke liye perfect height
    model.scale.set(scale, scale, scale);
    model.position.y = -1.2; 
    
    scene.add(model);
    document.getElementById('loader').style.display = 'none';

    // Bone Logic for Natural Pose
    model.traverse(o => {
        if (o.isBone) {
            const name = o.name.toLowerCase();
            if (name.includes("head")) head = o;
            
            // T-Pose Fix
            if (name.includes("arm") || name.includes("shoulder")) {
                if (name.includes("left")) o.rotation.z = 1.45;
                if (name.includes("right")) o.rotation.z = -1.45;
            }
        }
    });
});

camera.position.set(0, 0, 3.8);

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    if(model) {
        // --- NATURAL BREATHING SIMULATION ---
        // Sine wave se shoulders aur chest ka halka upar niche hona
        model.position.y = -1.2 + Math.sin(t * 1.2) * 0.005; 
        
        if(head) {
            // Smooth natural head tracking
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.08);
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.08);
        }
    }
    renderer.render(scene, camera);
}
animate();

// --- TOUCH & INTERACTION ---
document.getElementById('sendBtn').onclick = () => {
    // Mobile vibration for "Feel"
    if (navigator.vibrate) navigator.vibrate(40);
    
    const input = document.getElementById('userInput');
    if(input.value) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance("Ji, main sun rahi hoon. Boliye.");
        speech.lang = 'hi-IN';
        window.speechSynthesis.speak(speech);
        input.value = "";
    }
};

window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.5;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
