<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam AI - Fixed</title>
    <style>
        :root { --glow: #ff4757; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: fixed; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .input-box { display: flex; background: rgba(15, 15, 15, 0.95); border: 2.2px solid var(--glow); border-radius: 50px; width: 88%; max-width: 380px; box-shadow: 0 0 15px var(--glow); }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px 18px; outline: none; font-size: 16px; }
        button { background: var(--glow); border: none; width: 48px; height: 48px; border-radius: 50%; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Rupam se baat karein...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// 1. SCENE SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0); // Black screen fix
document.body.appendChild(renderer.domElement);

// LIGHTING
const ambLight = new THREE.AmbientLight(0xffffff, 3);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(2, 2, 5);
scene.add(dirLight);

let model, head, mouse = { x: 0, y: 0 };

// 2. MODEL LOADING
const loader = new GLTFLoader();
loader.load('https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(5).glb', (gltf) => {
    model = gltf.scene;
    
    // Size & Position Adjustments
    model.scale.set(0.6, 0.6, 0.6); 
    model.position.set(0, -1, 0); 
    scene.add(model);
    
    // 3. POSE FIXING (Bones Logic)
    model.traverse(o => {
        if (o.isBone) {
            const n = o.name.toLowerCase();
            if (n.includes("head")) head = o;
            
            // Haathon ko niche jhukana
            if (n.includes("arm") || n.includes("shoulder")) {
                if (n.includes("left")) o.rotation.z = 1.3;
                if (n.includes("right")) o.rotation.z = -1.3;
            }
        }
    });
}, 
// Loading progress check
(xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); },
// Error check
(error) => { console.error('Model load nahi hua:', error); });

camera.position.set(0, 0.5, 3.5);

// 4. SPEECH & INTERACTION
function speak(t) {
    window.speechSynthesis.cancel();
    const ut = new SpeechSynthesisUtterance(t);
    ut.lang = 'hi-IN';
    window.speechSynthesis.speak(ut);
}

document.getElementById('sendBtn').onclick = () => {
    const input = document.getElementById('userInput');
    if(input.value) {
        speak("Ji, main ab bilkul theek dikh rahi hoon aur mere haath bhi sahi hain!");
        input.value = "";
    }
};

window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.4;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

function animate() {
    requestAnimationFrame(animate);
    if(model && head) {
        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.1);
        head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.1);
    }
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
