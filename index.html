<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam N1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #ui-layer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .box { display: flex; background: rgba(20, 20, 20, 0.9); border: 2px solid #ff4757; border-radius: 50px; width: 88%; max-width: 380px; padding: 6px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }
        input { flex: 1; background: none; border: none; color: white; padding: 12px 18px; outline: none; font-size: 16px; }
        button { background: #ff4757; border: none; color: white; border-radius: 50%; width: 46px; height: 46px; cursor: pointer; }
        #loader { position: fixed; top: 50%; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div id="loader">Rupam N1 taiyaar ho rahi hai...</div>

<div id="ui-layer" style="display:none;">
    <div class="box">
        <input type="text" id="userInput" placeholder="Rupam se baat karein...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Environment Lighting
scene.add(new THREE.AmbientLight(0xffffff, 4));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(2, 2, 5);
scene.add(light);

let model, head, mouse = { x: 0, y: 0 };

// --- N1 DATA SAVED LINK ---
const modelURL = 'https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(6).glb';

const loader = new GLTFLoader();
loader.load(modelURL, (gltf) => {
    model = gltf.scene;

    // SIRF SIZE AUR POSITION (No Artificial Pose Changes)
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.1 / size.y; 
    model.scale.set(scale, scale, scale);
    model.position.y = -1.2; 
    
    scene.add(model);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('ui-layer').style.display = 'flex';

    // Bone Detection for Head Only
    model.traverse(o => {
        if (o.isBone && o.name.toLowerCase().includes("head")) {
            head = o;
        }
    });
}, undefined, (err) => {
    document.getElementById('loader').innerText = "Rupam N1 Error: Link check karein.";
});

camera.position.set(0, 0, 3.8);

function animate() {
    requestAnimationFrame(animate);
    if(model && head) {
        // Natural Head Tracking (Only reaction to you)
        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.07);
        head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.07);
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.4;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.25;
});

document.getElementById('sendBtn').onclick = () => {
    if (navigator.vibrate) navigator.vibrate(40);
    const input = document.getElementById('userInput');
    if(input.value) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance("Ji, Rupam N1 active hai.");
        speech.lang = 'hi-IN';
        window.speechSynthesis.speak(speech);
        input.value = "";
    }
};

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
