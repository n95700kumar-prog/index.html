<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 4));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(1, 1, 5);
scene.add(light);

let model, head, mouse = { x: 0, y: 0 };

new GLTFLoader().load('https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(5).glb', (gltf) => {
    model = gltf.scene;

    // --- AUTO-SKILL POWER: SCALE & CENTER LOGIC ---
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // Screen ke hisaab se height auto-calculate karna (Magic Scale)
    const scale = 2.2 / size.y; 
    model.scale.set(scale, scale, scale);
    
    // Model ko bilkul center aur bottom par lana
    model.position.y = -(size.y * scale) / 2 - 0.2;
    model.position.x = -center.x * scale;
    model.position.z = -center.z * scale;
    
    scene.add(model);
    document.getElementById('loader').style.display = 'none';

    // --- BONE SKILL: NATURAL POSE ---
    model.traverse(o => {
        if (o.isBone) {
            const n = o.name.toLowerCase();
            if (n.includes("head")) head = o;

            // Haathon ko naturally niche laana
            if (n.includes("arm") || n.includes("shoulder")) {
                // Rotation ko reset karke natural angle dena
                if (n.includes("left")) o.rotation.z = Math.PI / 2.3; 
                if (n.includes("right")) o.rotation.z = -Math.PI / 2.3;
            }
        }
    });
});

camera.position.set(0, 0, 3);

function animate() {
    requestAnimationFrame(animate);
    if(model && head) {
        // Smooth head tracking
        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.1);
        head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.1);
        
        // Halki si body movement (Natural breathing)
        model.position.y += Math.sin(Date.now() * 0.002) * 0.0002;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.5;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.3;
});
</script>
