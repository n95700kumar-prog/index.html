<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam AI - Life Simulation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #ui-layer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; transition: opacity 0.5s; }
        .box { display: flex; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); border: 2px solid #ff4757; border-radius: 50px; width: 88%; max-width: 380px; padding: 6px; box-shadow: 0 0 25px rgba(255, 71, 87, 0.4); }
        input { flex: 1; background: none; border: none; color: white; padding: 12px 18px; outline: none; font-size: 16px; }
        button { background: #ff4757; border: none; color: white; border-radius: 50%; width: 46px; height: 46px; cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        button:active { transform: scale(0.9); }
        #loader-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 200; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #ff4757; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-container">
    <div class="spinner"></div>
    <div id="status">Rupam load ho rahi hai... 0%</div>
</div>

<div id="ui-layer" style="opacity: 0; pointer-events: none;">
    <div class="box">
        <input type="text" id="userInput" placeholder="Rupam ko touch karein ya likhein...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Realistic Environment Lighting
scene.add(new THREE.AmbientLight(0xffffff, 3.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

let model, head, mouse = { x: 0, y: 0 };
let clock = new THREE.Clock();

// Model 6 Link with jsDelivr for faster loading
const modelURL = 'https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(6).glb';

const loader = new GLTFLoader();
loader.load(modelURL, (gltf) => {
    model = gltf.scene;

    // --- AUTO-SKILL: REALISTIC FIT ---
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.3 / size.y; 
    model.scale.set(scale, scale, scale);
    model.position.y = -1.3; 
    
    scene.add(model);
    
    // Hide loader and show UI
    document.getElementById('loader-container').style.display = 'none';
    const ui = document.getElementById('ui-layer');
    ui.style.opacity = '1';
    ui.style.pointer_events = 'auto';

    model.traverse(o => {
        if (o.isBone) {
            const n = o.name.toLowerCase();
            if (n.includes("head")) head = o;
            
            // NATURAL ARMS POSE
            if (n.includes("arm") || n.includes("shoulder")) {
                if (n.includes("left")) o.rotation.z = 1.4;
                if (n.includes("right")) o.rotation.z = -1.4;
            }
        }
    });
}, (xhr) => {
    const percent = Math.round((xhr.loaded / xhr.total) * 100);
    document.getElementById('status').innerText = `Rupam load ho rahi hai... ${percent}%`;
}, (err) => {
    document.getElementById('status').innerText = "Load Failed! Link check karein.";
});

camera.position.set(0, 0, 3.8);

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    if(model) {
        // --- NATURAL BEHAVIOR: BREATHING ---
        // Sine wave for subtle movement
        model.position.y = -1.3 + Math.sin(t * 1.4) * 0.005; 
        
        if(head) {
            // Smooth natural tracking
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.07);
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.07);
        }
    }
    renderer.render(scene, camera);
}
animate();

// --- INTERACTION & FEEL ---
window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.45;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

document.getElementById('sendBtn').onclick = () => {
    // Mobile Haptic Feedback
    if (navigator.vibrate) navigator.vibrate(50);
    
    const input = document.getElementById('userInput');
    if(input.value) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance("Ji, main aapko sun rahi hoon.");
        speech.lang = 'hi-IN';
        window.speechSynthesis.speak(speech);
        input.value = "";
    }
};

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
