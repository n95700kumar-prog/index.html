<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam AI - Perfect Version</title>
    <style>
        :root { --glow: #ff4757; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: fixed; bottom: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .input-box { display: flex; background: rgba(15, 15, 15, 0.95); border: 2px solid var(--glow); border-radius: 50px; width: 85%; max-width: 380px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 14px 20px; outline: none; font-size: 16px; }
        button { background: var(--glow); border: none; width: 50px; height: 50px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        #status { color: #fff; margin-bottom: 8px; font-size: 13px; text-shadow: 0 0 5px var(--glow); opacity: 0.8; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status">Rupam taiyaar hai...</div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Kuch puchiye...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Roshni (Lighting)
scene.add(new THREE.AmbientLight(0xffffff, 3.5));
const light = new THREE.DirectionalLight(0xffffff, 2.5);
light.position.set(1, 2, 4);
scene.add(light);

let model, head, mouse = { x: 0, y: 0 };

new GLTFLoader().load('https://cdn.jsdelivr.net/gh/n95700kumar-prog/index.html@main/model%20(5).glb', (gltf) => {
    model = gltf.scene;

    // --- PERFECT SIZE & POSITION LOGIC ---
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // Model ko automatically screen ke hisaab se scale karna
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3.5 / maxDim; 
    model.scale.set(scale, scale, scale);
    
    // Model ko center mein aur thoda niche lana
    model.position.y = - (size.y * scale) / 1.4;
    model.position.x = -center.x * scale;
    model.position.z = -center.z * scale;
    
    scene.add(model);
    
    // --- T-POSE & TRACKING FIX ---
    model.traverse(o => {
        if (o.isBone) {
            const n = o.name.toLowerCase();
            // Chehra tracking
            if (n.includes("head") || n.includes("neck")) head = o;

            // Haathon ko natural niche jhukana (Universal fix)
            if (n.includes("arm") || n.includes("shoulder") || n.includes("upperarm")) {
                if (n.includes("left")) o.rotation.z = 1.35;
                if (n.includes("right")) o.rotation.z = -1.35;
            }
        }
    });
    
    document.getElementById('status').innerText = "Rupam live hai!";
});

camera.position.set(0, 0, 5);

// Voice & Brain
function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'hi-IN';
    s.pitch = 1.1;
    window.speechSynthesis.speak(s);
}

document.getElementById('sendBtn').onclick = () => {
    const i = document.getElementById('userInput');
    const t = i.value.trim().toLowerCase();
    if(t) {
        let r = "Main aapki dost Rupam hoon. Aapka swagat hai!";
        if(t.includes("kaise ho")) r = "Main bohot achhi hoon, aap kaise hain?";
        if(t.includes("naam")) r = "Mera naam Rupam hai.";
        speak(r);
        i.value = "";
    }
};

// Mouse/Touch Tracking
window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.4;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.25;
});

function animate() {
    requestAnimationFrame(animate);
    if(model && head) {
        // Natural halke halke hilna
        model.position.y += Math.sin(Date.now() * 0.002) * 0.0005;
        // Face tracking
        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.1);
        head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.1);
    }
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
