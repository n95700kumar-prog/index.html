<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rupam AI - Model 6</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .box { display: flex; background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(8px); border: 1.8px solid #ff4757; border-radius: 50px; width: 85%; max-width: 380px; padding: 6px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }
        input { flex: 1; background: none; border: none; color: white; padding: 12px 18px; outline: none; font-size: 16px; }
        button { background: #ff4757; border: none; color: white; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; }
        #loader { position: fixed; top: 50%; width: 100%; text-align: center; color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">Naya Model Load Ho Raha Hai...</div>

<div id="ui-layer">
    <div class="box">
        <input type="text" id="userInput" placeholder="Rupam se baat karein...">
        <button id="sendBtn">❤️</button>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Realistic Lighting
scene.add(new THREE.AmbientLight(0xffffff, 3.8));
const light = new THREE.DirectionalLight(0xffffff, 2.5);
light.position.set(2, 2, 5);
scene.add(light);

let model, head, mouse = { x: 0, y: 0 };
let clock = new THREE.Clock();

const loader = new GLTFLoader();
// AAPKA NAYA LINK YAHAN HAI
const model6 = 'https://github.com/n95700kumar-prog/index.html/raw/refs/heads/main/model%20(6).glb';

loader.load(model6, (gltf) => {
    model = gltf.scene;

    // --- AUTO-SKILL: REALISTIC FITTING ---
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.1 / size.y; 
    model.scale.set(scale, scale, scale);
    model.position.y = -1.2; 
    
    scene.add(model);
    document.getElementById('loader').style.display = 'none';

    // BONE TRACKING & NATURAL POSE
    model.traverse(o => {
        if (o.isBone) {
            const n = o.name.toLowerCase();
            if (n.includes("head")) head = o;

            // Natural Arms (Anti-T-Pose)
            if (n.includes("arm") || n.includes("shoulder")) {
                if (n.includes("left")) o.rotation.z = 1.45;
                if (n.includes("right")) o.rotation.z = -1.45;
            }
        }
    });
}, undefined, (err) => {
    document.getElementById('loader').innerText = "Model 6 load nahi hua!";
    console.error(err);
});

camera.position.set(0, 0, 3.8);

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    if(model) {
        // --- NATURAL BREATHING SIMULATION ---
        model.position.y = -1.2 + Math.sin(time * 1.3) * 0.006; 
        
        if(head) {
            // Smooth natural tracking
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x, 0.08);
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y, 0.08);
        }
    }
    renderer.render(scene, camera);
}
animate();

// INTERACTION FEEL
document.getElementById('sendBtn').onclick = () => {
    if (navigator.vibrate) navigator.vibrate(40);
    const input = document.getElementById('userInput');
    if(input.value) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance("Ji, main sun rahi hoon.");
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
        input.value = "";
    }
};

window.addEventListener('pointermove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 0.45;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
