<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Realistic AI Girl - Interactive</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #overlay {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #0ff; font-family: 'Segoe UI', sans-serif;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="emotion-status">Mood: Normal</div>
        <small id="part-detect">Interaction: Ready</small>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, mixer, clock;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let head, neck, spine; 

        const MODEL_URL = 'https://github.com/n95700kumar-prog/index.html/raw/refs/heads/main/model%20(6).glb';

        init();

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            // Environment & Lighting (For Realism)
            const light = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(light);
            const spot = new THREE.SpotLight(0xffffff, 1.5);
            spot.position.set(5, 10, 5);
            scene.add(spot);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 1, 0);

            // Load Model
            const loader = new GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                model = gltf.scene;
                scene.add(model);

                // Bones mapping for realistic movement
                model.traverse(n => {
                    if(n.isBone) {
                        if(n.name.includes('Head')) head = n;
                        if(n.name.includes('Neck')) neck = n;
                        if(n.name.includes('Spine')) spine = n;
                    }
                });

                mixer = new THREE.AnimationMixer(model);
                if(gltf.animations[0]) mixer.clipAction(gltf.animations[0]).play();
            });

            window.addEventListener('click', onTouch);
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            animate();
        }

        // Realistic Behavior & Emotion Logic
        function onTouch(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(model.children, true);

            if (intersects.length > 0) {
                const part = intersects[0].object.name.toLowerCase();
                const status = document.getElementById('emotion-status');
                const detect = document.getElementById('part-detect');

                detect.innerText = "Touched: " + part;

                // Behavior Trigger
                if(part.includes('head') || part.includes('face')) {
                    status.innerText = "Mood: Shy / Blushing";
                    triggerReaction(0.2, 0.1); // Head tilt reaction
                } else if(part.includes('arm') || part.includes('hand')) {
                    status.innerText = "Mood: Surprised";
                    triggerReaction(0, 0.5);
                } else if(part.includes('leg')) {
                    status.innerText = "Mood: Ticklish";
                }
            }
        }

        function triggerReaction(x, y) {
            if(head) {
                head.rotation.x += x;
                head.rotation.y += y;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            // 1. Natural Breathing Movement (Behavior)
            if(spine) {
                spine.rotation.x = Math.sin(time * 1.5) * 0.02; 
            }

            // 2. Realistic Eye/Head Tracking
            if(head) {
                head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, mouse.x * 0.5, 0.05);
                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, -mouse.y * 0.3, 0.05);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
